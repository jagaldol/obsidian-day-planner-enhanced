name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "latest"

      - name: Get Version
        id: version
        run: |
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        id: build
        run: npm run build

      - name: Package
        run: |
          mkdir day-planner-enhanced
          cp main.js manifest.json styles.css README.md day-planner-enhanced
          zip -r "day-planner-enhanced-${{ steps.version.outputs.tag }}.zip" day-planner-enhanced

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > release-notes.md <<'EOF'
          Day Planner Enhanced ${{ steps.version.outputs.tag }} GitHub release.

          Install with BRAT or download the release assets manually.
          EOF

          gh release create "${{ steps.version.outputs.tag }}" \
            main.js \
            manifest.json \
            styles.css \
            "day-planner-enhanced-${{ steps.version.outputs.tag }}.zip" \
            --title "Day Planner Enhanced ${{ steps.version.outputs.tag }}" \
            --notes-file release-notes.md \
            --latest
