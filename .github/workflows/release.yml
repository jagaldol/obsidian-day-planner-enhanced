name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "latest"

      - name: Get Version
        id: version
        run: |
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        id: build
        run: npm run build

      - name: Package
        run: |
          mkdir day-planner-enhanced
          cp main.js manifest.json styles.css README.md day-planner-enhanced
          zip -r "day-planner-enhanced-${{ steps.version.outputs.tag }}.zip" day-planner-enhanced

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          # Extract the section for this version from CHANGELOG.md (## <tag> ...)
          awk -v ver="$TAG" '
            $0 ~ "^## "ver"([ \t]|$)" { flag=1; next }
            /^## / && flag { exit }
            flag { print }
          ' CHANGELOG.md > release-notes.md

          # Fall back to a generic note if the version is not in the changelog
          if [ ! -s release-notes.md ] || ! grep -q '[^[:space:]]' release-notes.md; then
            printf 'Day Planner Enhanced %s.\n\nInstall with BRAT or download the release assets manually.\n' "$TAG" > release-notes.md
          fi

          gh release create "$TAG" \
            main.js \
            manifest.json \
            styles.css \
            "day-planner-enhanced-$TAG.zip" \
            --title "Day Planner Enhanced $TAG" \
            --notes-file release-notes.md \
            --latest
