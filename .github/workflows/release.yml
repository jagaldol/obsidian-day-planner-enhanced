name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "latest"

      - name: Get Version
        id: version
        run: |
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        id: build
        run: npm run build

      - name: Attest release assets
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          # Extract the section for this version from CHANGELOG.md (## <tag> ...)
          awk -v ver="$TAG" '
            $0 ~ "^## "ver"([ \t]|$)" { flag=1; next }
            /^## / && flag { exit }
            flag { print }
          ' CHANGELOG.md > release-notes.md

          # Fall back to a generic note if the version is not in the changelog
          if [ ! -s release-notes.md ] || ! grep -q '[^[:space:]]' release-notes.md; then
            printf 'Day Planner Enhanced %s.\n\nInstall from Obsidian community plugins or download the release assets manually.\n' "$TAG" > release-notes.md
          fi

          gh release create "$TAG" \
            main.js \
            manifest.json \
            styles.css \
            --title "Day Planner Enhanced $TAG" \
            --notes-file release-notes.md \
            --latest
